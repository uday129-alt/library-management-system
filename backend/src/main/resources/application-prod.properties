# ============================================
# Production Profile - values come from
# environment variables set in Railway/Render
# ============================================

# Server
server.port=${PORT:8080}

# Database - set these in Railway environment variables
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT - set this in Railway environment variables
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# Fine per day
app.fine.per-day=${FINE_PER_DAY:5.0}

# Disable verbose logging in production
logging.level.com.library=INFO
logging.level.org.springframework.security=WARN
