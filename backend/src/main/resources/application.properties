# ==========================================
# Library Management System - Configuration
# ==========================================

# Server
server.port=8080

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/library_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=LibraryManagementSystemSecretKey2024VeryLongAndSecureBase64EncodedString
app.jwt.expiration=86400000

# Fine Configuration (per day in currency units)
app.fine.per-day=5.0

# Logging
logging.level.com.library=DEBUG
logging.level.org.springframework.security=INFO
